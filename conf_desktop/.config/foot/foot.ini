[key-bindings]
unicode-input=none
show-urls-launch=Control+Shift+j
show-urls-copy=Control+Shift+u
show-urls-persistent=none
pipe-command-output=[wl-copy -n] Control+Shift+l

[desktop-notifications]
command=notify-send "${title}" "${body}"
