shell=/usr/bin/fish
font=Source Code Pro:size=13
dpi-aware=no

[scrollback]
lines=20000

[bell]
notify=yes

[colors-dark]
foreground=f1f3f3
background=353535
cursor=353535 93a1a1
regular0=5f5f5f
regular1=d96468
regular2=a2d964
regular3=d9c964
regular4=64a2d9
regular5=9a64d9
regular6=64d9d5
regular7=989898
